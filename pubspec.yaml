name: grad_ready
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.4.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  fl_chart: ^0.69.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2
  path: ^1.9.1
  http: ^1.2.0
  xml: ^6.5.0
  firebase_crashlytics: ^4.3.10
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  # Declares bundled folders: `assets/logo.svg` (login/home/splash UI),
  # `assets/data/skill_match_results.csv` (skill match screen). Keep folders small for release.
  # Launcher/splash tools reference `assets/logo_app.png` — that file must exist for those steps.
  assets:
    - assets/
    - assets/data/

flutter_native_splash:
  color: "#000000"
  image: assets/logo_app.png
  android_12:
    color: "#000000"
    image: assets/logo_app.png
    icon_background_color: "#000000"
  full_screen: true
  ios: true
  android_gravity: center
  ios_content_mode: center
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo_app.png"
